name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "${{ github.ref_name }}" dist/* \
            --title "monopigi ${{ github.ref_name }}" \
            --notes "PyPI: https://pypi.org/project/monopigi/$VERSION/

Install: \`pip install monopigi==$VERSION\`"
